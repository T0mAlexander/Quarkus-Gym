# Quarkus
quarkus.package.main-class=org.quarkus.Main
quarkus.log.level=INFO
quarkus.http.access-log.enabled=true
quarkus.rest-client.logging.scope=all
#quarkus.rest-client.logging.body-limit=50
#quarkus.log.category."org.jboss.resteasy.reactive.client.logging".level=DEBUG

# Postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/java
quarkus.datasource.username=java
quarkus.datasource.password=123
quarkus.datasource.db-kind=postgresql
#quarkus.datasource.jdbc.min-size=5
#quarkus.datasource.jdbc.max-size=20
#quarkus.datasource.jdbc.idle-removal-interval=10M
#quarkus.datasource.jdbc.max-lifetime=30M

# Hibernate
quarkus.hibernate-orm.validation.enabled=true
quarkus.hibernate-orm.database.generation.create-schemas=true
quarkus.hibernate-orm.database.default-schema=public
quarkus.hibernate-orm.log.sql=false
uarkus.hibernate-orm.log.highlight-sql=true
quarkus.hibernate-orm.log.format-sql=true
quarkus.hibernate-orm.jdbc.timezone=America/Sao_Paulo
quarkus.hibernate-orm.database.version-check.enabled=true
quarkus.datasource.db-version=17

# JWT
smallrye.jwt.new-token.signature-algorithm=RS256
smallrye.jwt.verify.key.location=classpath:/keys/jwt.pem
smallrye.jwt.verify.key-format=PEM_KEY
smallrye.jwt.sign.key.location=classpath:/keys/jwt-privkey.pem
smallrye.jwt.sign.key-format=PEM_KEY

# Redis
quarkus.redis.hosts=redis://localhost:6379
# quarkus.redis.timeout=5s
# quarkus.redis.client.max-pool-size=20
# quarkus.redis.client.min-idle=5
# quarkus.redis.password=*****

